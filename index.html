<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaMart</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#EAEDED;
}

/* TOPBAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    flex-wrap:wrap;
}

.logo-img{
    height:45px;
}

.nav{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.nav button{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

.nav button:hover{
    color:#FF9900;
}

#searchInput{
    padding:8px;
    width:220px;
    border:none;
    border-radius:4px;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* SLIDER */
.slider{
    position:relative;
    height:90vh;
    width:100%;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transform:scale(1.1);
    transition:1s;
}

.slide.active{
    opacity:1;
    transform:scale(1);
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom,rgba(0,0,0,0.3),rgba(0,0,0,0.7));
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.overlay h1{font-size:50px;}
.overlay p{font-size:20px;}

/* PRODUCTS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    cursor:pointer;
}

.buy{
    background:green;
    color:white;
}

.cartbtn{
    background:#FF9900;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div>
        <img src="images/logo.png" class="logo-img">
    </div>

    <div class="nav">

        <button onclick="show('home')">Home</button>
        <button onclick="show('products')">Products</button>
        <button onclick="show('cart')">Cart</button>

        <input id="searchInput" onkeyup="searchProducts()" placeholder="Search products...">

    </div>
</div>

<!-- HOME -->
<div id="home" class="section active">

<div class="slider">

    <div class="slide active" style="background-image:url('images/tag.png')">
        <div class="overlay">
            <h1>Welcome to NovaMart</h1>
        </div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30')">
        <div class="overlay">
            <h1>Electronics Deals</h1>
            <p>Up to 60% OFF</p>
        </div>
    </div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f')">
        <div class="overlay">
            <h1>Fashion Sale</h1>
            <p>New Arrivals Weekly</p>
        </div>
    </div>

</div>

</div>

<!-- PRODUCTS -->
<div id="products" class="section">
    <h2 style="padding:20px;">Products</h2>
    <div id="productList" class="grid"></div>
</div>

<!-- CART -->
<div id="cart" class="section">
    <h2 style="padding:20px;">Cart</h2>
    <div id="cartList"></div>
    <h3 id="total" style="padding:20px;"></h3>
</div>

</div>

<script>

/* DATA */
let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"Headphones", price:50, img:Math test/200"},
    {name:"Mouse", price:25, img:"https://via.placeholder.com/200"},
    {name:"Keyboard", price:70, img:"https://via.placeholder.com/200"},
    {name:"Phone", price:300, img:"https://via.placeholder.com/200"},
    {name:"PS5", price:700, img:"https://via.placeholder.com/200"},
    {name:"Tablet", price:350, img:"https://via.placeholder.com/200"},

];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* NAV */
function show(page){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(page).classList.add("active");
    render();
}

/* PRODUCTS */
function renderProducts(){
    let box = document.getElementById("productList");
    box.innerHTML = "";

    products.forEach((p,i)=>{
        box.innerHTML += `
        <div class="card">
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>

            <button class="btn cartbtn" onclick="addToCart(${i})">
                Add to Cart
            </button>

            <button class="btn buy" onclick="buyNow('${p.name}', ${p.price})">
                Buy Now
            </button>

        </div>`;
    });
}

/* CART */
function addToCart(i){
    cart.push(products[i]);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart");
}

function renderCart(){
    let box = document.getElementById("cartList");
    box.innerHTML = "";
    let total = 0;

    cart.forEach((p,i)=>{
        total += Number(p.price);

        box.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>

            <button onclick="removeFromCart(${i})" style="
                background:red;
                color:white;
                border:none;
                padding:8px;
                width:100%;
                cursor:pointer;
            ">
                Remove
            </button>
        </div>`;
    });

    document.getElementById("total").innerText = "Total: $" + total;
}

/* REMOVE FROM CART */
function removeFromCart(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* BUY NOW → WHATSAPP */
function buyNow(name, price){
    let phone = "994558530802";

    let message = `🛒 New Order:
Product: ${name}
Price: $${price}`;

    let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}

/* ADMIN */
function renderAdmin(){
    let box = document.getElementById("adminList");
    box.innerHTML = "";

    products.forEach((p,i)=>{
        box.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="deleteProduct(${i})">Delete</button>
        </div>`;
    });
}

function addProduct(){
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let img = document.getElementById("img").value;

    products.push({name, price, img});
    localStorage.setItem("products", JSON.stringify(products));
    render();
}

function deleteProduct(i){
    products.splice(i,1);
    localStorage.setItem("products", JSON.stringify(products));
    render();
}

/* SEARCH */
function searchProducts(){
    let value = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll("#productList .card");

    cards.forEach(card=>{
        let name = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = name.includes(value) ? "block" : "none";
    });
}

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
    slides.forEach(s=>s.classList.remove("active"));
    slides[index].classList.add("active");
    index = (index + 1) % slides.length;
},4000);

/* RENDER */
function render(){
    renderProducts();
    renderCart();
}

render();

</script>

</body>
</html>
