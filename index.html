<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMart</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#EAEDED;
}

/* TOPBAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 15px;
    flex-wrap:wrap;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#FF9900;
}

.nav{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.nav button{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:15px;
}

.nav button:hover{
    color:#FF9900;
}

#searchInput{
    padding:8px;
    width:220px;
    border:none;
    border-radius:4px;
}

/* Sections */
.section{
    display:none;
}

.active{
    display:block;
}

/* Slider */
.slider{
    position:relative;
    height:90vh;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.overlay h1{
    font-size:50px;
    margin:0;
}

.overlay p{
    font-size:20px;
}

/* Products */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:5px;
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    margin-top:8px;
    cursor:pointer;
    border-radius:5px;
}

.cartbtn{
    background:#FF9900;
}

.buy{
    background:green;
    color:white;
}

.remove{
    background:red;
    color:white;
}

#cartList{
    padding:20px;
}

#total{
    padding:20px;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

    <div class="logo">NovaMart</div>

    <div class="nav">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('products')">Products</button>
        <button onclick="showPage('cart')">Cart</button>

        <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
            onkeyup="searchProducts()"
        >
    </div>

</div>

<!-- HOME -->
<div id="home" class="section active">

    <div class="slider">

        <div class="slide active"
             style="background-image:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30');">
            <div class="overlay">
                <h1>Welcome to NovaMart</h1>
                <p>Best Deals Everyday</p>
            </div>
        </div>

        <div class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');">
            <div class="overlay">
                <h1>Fashion Sale</h1>
                <p>New Arrivals Weekly</p>
            </div>
        </div>

        <div class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e');">
            <div class="overlay">
                <h1>Electronics Deals</h1>
                <p>Up To 60% OFF</p>
            </div>
        </div>

    </div>

</div>

<!-- PRODUCTS -->
<div id="products" class="section">

    <h2 style="padding:20px;">Products</h2>

    <div id="productList" class="grid"></div>

</div>

<!-- CART -->
<div id="cart" class="section">

    <h2 style="padding:20px;">Shopping Cart</h2>

    <div id="cartList"></div>

    <h3 id="total"></h3>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [

    {
        name: "Math_test",
        price: 50,
        img: "images/Math_test.png"
    },

    {
        name:"Keyboard",
        price:70,
        img:"https://via.placeholder.com/300x200?text=Keyboard"
    },

    {
        name:"Phone",
        price:300,
        img:"https://via.placeholder.com/300x200?text=Phone"
    },

    {
        name:"PS5",
        price:700,
        img:"https://via.placeholder.com/300x200?text=PS5"
    },

    {
        name:"Tablet",
        price:350,
        img:"https://via.placeholder.com/300x200?text=Tablet"
    }

];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Navigation */
function showPage(page){

    document.querySelectorAll(".section").forEach(section=>{
        section.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");

    render();
}

/* Products */
function renderProducts(){

    let box = document.getElementById("productList");

    box.innerHTML = "";

    products.forEach((product,index)=>{

        box.innerHTML += `
        <div class="card">

            <img src="${product.img}" alt="${product.name}">

            <h3>${product.name}</h3>

            <p>$${product.price}</p>

            <button
                class="btn cartbtn"
                onclick="addToCart(${index})">
                Add To Cart
            </button>

            <button
                class="btn buy"
                onclick="buyNow('${product.name}', ${product.price})">
                Buy Now
            </button>

        </div>
        `;
    });
}

/* Cart */
function addToCart(index){

    cart.push(products[index]);

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Added to cart");
}

function renderCart(){

    let box = document.getElementById("cartList");

    let total = 0;

    box.innerHTML = "";

    cart.forEach((item,index)=>{

        total += Number(item.price);

        box.innerHTML += `
        <div class="card">

            <h3>${item.name}</h3>

            <p>$${item.price}</p>

            <button
                class="btn remove"
                onclick="removeFromCart(${index})">
                Remove
            </button>

        </div>
        `;
    });

    document.getElementById("total").innerText =
        "Total: $" + total;
}

function removeFromCart(index){

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));

    renderCart();
}

/* Search */
function searchProducts(){

    let value =
        document.getElementById("searchInput")
        .value.toLowerCase();

    let cards =
        document.querySelectorAll("#productList .card");

    cards.forEach(card=>{

        let text =
            card.querySelector("h3")
            .innerText.toLowerCase();

        card.style.display =
            text.includes(value)
            ? "block"
            : "none";
    });
}

/* WhatsApp Buy */
function buyNow(name, price){

    let phone = "994558530802";

    let message =
`🛒 New Order

Product: ${name}
Price: $${price}`;

    let url =
`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url,"_blank");
}

/* Slider */
let slides = document.querySelectorAll(".slide");

let currentSlide = 0;

setInterval(()=>{

    slides.forEach(slide=>{
        slide.classList.remove("active");
    });

    currentSlide =
        (currentSlide + 1) % slides.length;

    slides[currentSlide].classList.add("active");

},4000);

/* Render */
function render(){

    renderProducts();
    renderCart();
}

render();

</script>

</body>
</html>
